<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5e3a"/>
      <stop offset="100%" style="stop-color:#2d8f5e"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="#ffffff" opacity="0.05"/>
  <circle cx="1100" cy="550" r="150" fill="#ffffff" opacity="0.03"/>
  <circle cx="150" cy="580" r="120" fill="#ffffff" opacity="0.04"/>
  
  <!-- Map pin icon -->
  <g transform="translate(600, 280)">
    <path d="M0,-120 C-50,-120 -90,-80 -90,-30 C-90,40 0,140 0,140 C0,140 90,40 90,-30 C90,-80 50,-120 0,-120Z" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="-40" r="35" fill="#1a5e3a"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">全国リサイクルマップ</text>
  
  <!-- Subtitle -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#ffffff" opacity="0.85">日本全国のリサイクル拠点を探すマップ</text>
  
  <!-- English subtitle -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#ffffff" opacity="0.6">JAPAN RECYCLE MAP</text>
</svg>
