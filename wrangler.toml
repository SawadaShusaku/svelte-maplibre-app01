name = "svelte-maplibre-app01-dev"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-04-29"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# Recommended database names:
# - recycling-facilities-dev
# - recycling-facilities-preview
# - recycling-facilities-prod
#
# Replace the placeholder database_id values after creating the D1 databases.
[[d1_databases]]
binding = "RECYCLING_DB"
database_name = "recycling-facilities-dev"
database_id = "00000000-0000-0000-0000-000000000000"

[env.preview]
name = "svelte-maplibre-app01-preview"

[[env.preview.d1_databases]]
binding = "RECYCLING_DB"
database_name = "recycling-facilities-preview"
database_id = "26327863-633c-47e0-a352-ddc798b0a3e3"

[env.production]
name = "svelte-maplibre-app01"

[[env.production.d1_databases]]
binding = "RECYCLING_DB"
database_name = "recycling-facilities-prod"
database_id = "36efb56c-0cc8-45a3-a1f3-6eb81777adbf"
