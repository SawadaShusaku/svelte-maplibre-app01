name = "svelte-maplibre-app01"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-04-29"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

# Mapillary 周辺画像レスポンスを 24h キャッシュする KV 名前空間。
# 事前に `npx wrangler kv namespace create MAPILLARY_CACHE`（および `--preview`）で
# 取得した ID をそれぞれ id / preview_id に貼り付けてください。
[[kv_namespaces]]
binding = "MAPILLARY_CACHE"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# Mapillary クライアントトークンは `npx wrangler secret put MAPILLARY_TOKEN`
# でサーバ専用シークレットとして登録します（ブラウザには公開されません）。
